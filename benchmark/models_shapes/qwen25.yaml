fill_:
  shapes:
    - [65535]
    - [8, 16, 32]
    - [256, 16, 32]
    - [8]
    - [256]
    - [0, 512]

mm:  # batch size from  1 to 8192, and B stride is always column major # [B stride]: (1, 3584)
  shapes:
    - [1, 1, 16, 4]
    - [1, 2, 16, 4]
    - [1, 3, 16, 4]
    - [1, 5, 16, 4]
    - [1, 6, 16, 4]
    - [1, 7, 16, 4]
    - [1, 8, 16, 4]
    - [1, 256, 16, 4]
    # batch size = 8
    - [1, 8, 16, 4]
    - [1, 8, 16, 4]
    - [1, 8, 16, 4]
    # batch size = 98
    - [1, 98, 16, 4]
    - [1, 98, 16, 4]
    - [1, 98, 16, 4]
    # batch size = 256
    - [1, 256, 16, 4]
    - [1, 256, 16, 4]
    - [1, 256, 16, 4]
    # batch size = 8192
    - [1, 512, 16, 4]
    - [1, 512, 16, 4]
    - [1, 512, 16, 4]
  shape_desc: "B, M, N, K" # shapes are defined as (B, M, N, K)


addmm:  #  B stride is always column major # [B stride]: (1, 3584)
  shapes:
    - [1, 4, 16, 4]
    - [1, 6, 16, 4]
    - [1, 7, 16, 4]
    - [1, 8, 16, 4]
    - [1, 16, 16, 4]
    - [1, 32, 16, 4]
    - [1, 64, 16, 4]
    - [1, 68, 16, 4]
    - [1, 98, 16, 4]
    - [1, 113, 16, 4]
    - [1, 256, 16, 4]
    - [1, 512, 16, 4]
  shape_desc: "B, M, N, K" # shapes are defined as (B, M, N, K)

fused_add_rms_norm:
  shapes:
    - [4, 512]
    - [8, 512]
    - [16, 512]
    - [32, 512]
    - [64, 512]
    - [113, 512]
    - [256, 512]
    - [4096, 512]

sort:
  shapes:
    - [4, 512]


