name: triage
on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - id: labeler
        uses: actions/labeler@b8dd2d9be0f68b860e7dae5dae7d772984eacd6d  # v6.2.0
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          sync-labels: true
      - id: sizer
        uses: codelytv/pr-size-labeler@095a41fca88b8764fd9e008ad269bcdb82bb38b9  # v1.10.4
        with:
          xs_label: 'size/XSmall'
          xs_max_size: '10'
          s_label: 'size/Small'
          s_max_size: '100'
          m_label: 'size/Medium'
          m_max_size: '500'
          l_label: 'size/Large'
          l_max_size: '1000'
          xl_label: 'size/XLarge'
          fail_if_xl: 'false'
          message_if_xl: >
            This PR exceeds the recommended size of 1000 lines.
            Please make sure you are NOT addressing multiple issues with one PR.
            Note this PR might be rejected due to its size.
          github_api_url: 'https://api.github.com'
          files_to_ignore: ''
      - id: identify-pr-type
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const prTitle = context.payload.pull_request.title
            const prNumber = context.payload.pull_request.number;
            if (prTitle.includes('FlagGems Operator Development Competition')) {
              await github.rest.issues.addLabels({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: ['competition']
              });
            }
            if (prTitle.includes('KernelGen')) {
              await github.rest.issues.addLabels({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: ['KernelGen']
              });
            }
