name: cpp-ops

permissions:
  contents: read

on:
  workflow_call:
  workflow_dispatch:

jobs:
  test:
    runs-on: h20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        continue-on-error: true
      - uses: ./.github/actions/checkout-retry
      - uses: ./.github/actions/setup-flaggems
        with:
          backend: nvidia-cuda133
          gpu_check_script: tools/gpu_check_nvidia.sh

      - shell: bash
        run: |
          source .venv/bin/activate
          export PATH="/home/secure/.local/bin:/usr/local/cuda/bin:$PATH"
          tools/set_cpp_vendor.sh cuda
          export CMAKE_ARGS="-DFLAGGEMS_BUILD_C_EXTENSIONS=ON -DFLAGGEMS_BACKEND=CUDA -DCMAKE_BUILD_TYPE=Release"
          uv pip install -v -e ./cpp --no-build-isolation
      - shell: bash
        run: |
          source .venv/bin/activate
          export PATH="/home/.local/bin:/usr/local/cuda/bin:$PATH"
          cd cpp/build/cpython-*/ctests
          export FLAGGEMS_SOURCE_DIR=$(python -c "import os;import flag_gems;print(os.path.dirname(flag_gems.__file__))")
          ctest -V
