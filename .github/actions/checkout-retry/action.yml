name: "Checkout with Retry"
description: "Checkout the repository with up to 3 attempts, sleeping 30s between failures"

inputs:
  ref:
    description: "Git ref to checkout (leave empty for default)"
    required: false
    default: ""
  submodules:
    description: "Whether to checkout submodules"
    required: false
    default: "false"
  fetch-depth:
    description: "Fetch depth for checkout"
    required: false
    default: "1"

runs:
  using: "composite"
  steps:
    - id: checkout-attempt-1
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        ref: ${{ inputs.ref || github.ref }}
        submodules: ${{ inputs.submodules }}
        fetch-depth: ${{ inputs.fetch-depth }}
      continue-on-error: true

    - id: sleep-1
      if: steps.checkout-attempt-1.outcome == 'failure'
      shell: bash
      run: sleep 30s

    - id: checkout-attempt-2
      if: steps.checkout-attempt-1.outcome == 'failure'
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        ref: ${{ inputs.ref || github.ref }}
        submodules: ${{ inputs.submodules }}
        fetch-depth: ${{ inputs.fetch-depth }}
      continue-on-error: true

    - id: sleep-2
      if: steps.checkout-attempt-2.outcome == 'failure'
      shell: bash
      run: sleep 30s

    - id: checkout-attempt-3
      if: steps.checkout-attempt-2.outcome == 'failure'
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        ref: ${{ inputs.ref || github.ref }}
        submodules: ${{ inputs.submodules }}
        fetch-depth: ${{ inputs.fetch-depth }}
